    <style>
        .projects-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .project-preview {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
        }

        .project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .project-card:hover .project-preview img {
            transform: scale(1.05);
        }

        .project-preview-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .project-preview-placeholder i {
            font-size: 4rem;
            color: white;
        }

        .project-content {
            padding: 1.5rem;
        }

        .project-content h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .project-content p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tech-tag {
            background: rgba(108, 99, 255, 0.2);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .project-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .project-link:hover {
            color: var(--primary);
        }

        .project-link i {
            font-size: 1rem;
        }
    </style>

        // Function to get website screenshot using a free service (like thum.io or similar)
        // This generates a preview image automatically for each Vercel link, similar to how WhatsApp shows link previews.
        function getProjectPreview(project, link) {
            // Use a free screenshot API to automatically capture the website thumbnail.
            // The service 'api.microlink.io' provides a simple way to get website screenshots.
            // We'll construct the URL with the project link and a fallback size.
            const screenshotApiUrl = `https://api.microlink.io/?url=${encodeURIComponent(link)}&screenshot=true&meta=false&embed=screenshot.url`;
            
            // Return an image tag with the API as the source. 
            // We also add an onerror fallback to show a placeholder icon if the image fails to load.
            return `
                <img src="${screenshotApiUrl}" 
                     alt="${project.title} preview" 
                     loading="lazy"
                     onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'project-preview-placeholder\\'><i class=\\'fas ${project.icon || 'fa-globe'}\\'></i><div style=\\'position: absolute; bottom: 10px; font-size: 10px; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px;\\'>${new URL(link).hostname}</div></div>';">
            `;
        }

        // Render projects into the container
        function renderProjects() {
            const container = document.getElementById('projectsContainer');
            if (!container) return;
            
            container.innerHTML = projects.map((project, index) => {
                const link = project.link;
                const previewHtml = getProjectPreview(project, link);
                
                // Dynamic translation keys for bilingual support
                const titleKey = `project${index + 1}Title`;
                const descKey = `project${index + 1}Desc`;
                
                return `
                    <div class="project-card">
                        <div class="project-preview">
                            ${previewHtml}
                        </div>
                        <div class="project-content">
                            <h3 data-key="${titleKey}">${project.title}</h3>
                            <p data-key="${descKey}">${project.description}</p>
                            <div class="project-tech">
                                ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                            </div>
                            <div class="project-links">
                                <a href="${link}" class="project-link" target="_blank" rel="noopener noreferrer">
                                    <i class="fas fa-external-link-alt"></i> 
                                    <span data-key="viewProject">View Project</span>
                                </a>
                                <a href="${link}" class="project-link" target="_blank" rel="noopener noreferrer" style="margin-left: 10px;">
                                    <i class="fas fa-arrow-up-right-from-square"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Extend translation texts to include dynamic project data and new phrases
        function extendTranslations() {
            if (typeof texts === 'undefined') {
                window.texts = { en: {}, ar: {} };
            }
            if (!texts.en) texts.en = {};
            if (!texts.ar) texts.ar = {};

            // Add static translations
            texts.en.viewProject = "View Project";
            texts.ar.viewProject = "عرض المشروع";
            texts.en.backHome = "Back to Home";
            texts.ar.backHome = "العودة للرئيسية";
            texts.en.projectsTitle = "My Projects";
            texts.ar.projectsTitle = "مشاريعي";

            // Add each project's bilingual title and description
            const arabicTitles = [
                "هيلمي للسفر", "ذا هايف الجديدة", "محمد عطا الله", "صنايع دلتا",
                "الجزيرة سيبيا", "تسنيم بييد", "أشرقت جمال", "ياسمينة",
                "حسام الكاراشي", "سلمى ثيتا", "حنين تو"
            ];
            const arabicDescriptions = [
                "منصة سفر وسياحة عصرية بتصميم أنيق تعرض الوجهات والخدمات بتجربة مستخدم غامرة.",
                "موقع مساحة عمل تعاونية أو مجتمع ديناميكي يتميز بجماليات حديثة وتنقل سلس لإنتاجية الفريق.",
                "موقع بورتفوليو احترافي لمحمد عطا الله يبرز الأعمال الإبداعية والمهارات والإنجازات بتصميم نظيف.",
                "وجود إلكتروني أنيق لسناء دلتا، ربما علامة تجارية أو فنانة أو خدمة، بواجهة بسيطة وجذابة.",
                "منصة مستوحاة من الأخبار أو غنية بالوسائط بتصميم بني داكن، تقدم تجربة سرد بصري فريدة.",
                "تطبيق ويب مبهج لتسنيم، ربما مخبز أو متجر حلويات أو بورتفوليو إبداعي بجمالية ساحرة.",
                "موقع شخصي أو تجاري لأشرقت جمال يعرض خدمات أو مشاريع أو هوية تجارية بمظهر مصقول.",
                "منصة ويب أنيقة وأنثوية لياسمينة تركز على الأناقة أو محتوى نمط الحياة أو الخدمات المهنية.",
                "بورتفوليو قوي أو موقع أعمال لحسام الكاراشي يركز على الخبرة والاحترافية وحضور بصري قوي.",
                "موقع إبداعي وعصري لسلمى، ربما مصممة أو مطورة أو فنانة، مع تركيز على العلامة التجارية المستوحاة من ثيتا.",
                "موقع بتصميم مزدوج أو الإصدار الثاني لحنين يقدم مزيجًا من العلامة التجارية الشخصية أو المدونة أو عرض الخدمات."
            ];

            projects.forEach((project, index) => {
                const titleKey = `project${index + 1}Title`;
                const descKey = `project${index + 1}Desc`;
                
                if (!texts.en[titleKey]) texts.en[titleKey] = project.title;
                if (!texts.en[descKey]) texts.en[descKey] = project.description;
                
                if (!texts.ar[titleKey] && arabicTitles[index]) texts.ar[titleKey] = arabicTitles[index];
                if (!texts.ar[descKey] && arabicDescriptions[index]) texts.ar[descKey] = arabicDescriptions[index];
            });
        }

        // Initialize everything after DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            extendTranslations();
            renderProjects();
            
            // If language.js exposes a function to update UI, we could call it here.
            // But we rely on the existing language toggle to refresh the page or re-render.
            if (typeof updateContent === 'function') {
                // Optional: force a language update if the function exists
                setTimeout(() => {
                    const currentLang = localStorage.getItem('language') || 'en';
                    if (typeof updateContent === 'function') updateContent(currentLang);
                }, 100);
            }
        });
